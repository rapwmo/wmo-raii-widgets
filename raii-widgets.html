<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RA II – Carousel & Meetings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: transparent;
      color: #222;
    }

    :root {
      --wmo-blue:      #00529C;
      --wmo-blue-dark: #003d75;
      --wmo-blue-mid:  #0069c0;
      --white:         #ffffff;
      --grey-bg:       #f4f7fb;
      --grey-border:   #dce5ef;
      --text-main:     #1a2636;
      --text-sub:      #4a6080;
      --orange:        #d35400;
      --radius:        8px;
      --shadow:        0 2px 10px rgba(0,82,156,0.12);
    }

    /* ══════════════════════════════
       IMAGE CAROUSEL
    ══════════════════════════════ */
    .carousel-block {
      position: relative;
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      background: #000;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.55s cubic-bezier(0.4,0,0.2,1);
      height: 420px;
    }

    .carousel-slide {
      min-width: 100%;
      position: relative;
      flex-shrink: 0;
    }

    .carousel-slide img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      display: block;
    }

    /* Caption overlay */
    .carousel-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 16px 20px 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.65));
    }

    .caption-inner {
      background: rgba(255,255,255,0.92);
      border-radius: 6px;
      padding: 12px 16px;
      max-width: 640px;
    }

    .caption-tag {
      display: inline-block;
      background: var(--wmo-blue);
      color: var(--white);
      font-size: 0.68em;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 3px;
      margin-bottom: 7px;
    }

    .caption-title {
      font-size: 0.95em;
      font-weight: 700;
      color: var(--wmo-blue);
      line-height: 1.35;
      margin-bottom: 5px;
    }
    .caption-title a {
      color: inherit;
      text-decoration: none;
    }
    .caption-title a:hover { text-decoration: underline; }

    .caption-desc {
      font-size: 0.78em;
      color: #555;
      line-height: 1.4;
      border-top: 1px solid rgba(0,0,0,0.08);
      padding-top: 6px;
      margin-top: 4px;
    }

    /* Prev / Next buttons */
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.45);
      color: var(--white);
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 1.1em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 10;
    }
    .carousel-btn:hover { background: rgba(0,82,156,0.75); }
    .carousel-btn.prev { left: 12px; }
    .carousel-btn.next { right: 12px; }

    /* Dots */
    .carousel-dots {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      z-index: 10;
    }
    .carousel-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      border: none;
    }
    .carousel-dot.active {
      background: var(--white);
      transform: scale(1.25);
    }

    /* Loading skeleton */
    .carousel-loading {
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--grey-bg);
      color: var(--text-sub);
      font-size: 0.9em;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    /* ══════════════════════════════
       SECTION HEADER (shared)
    ══════════════════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--wmo-blue-dark) 0%, var(--wmo-blue-mid) 100%);
      color: var(--white);
      padding: 10px 16px;
      border-radius: var(--radius) var(--radius) 0 0;
      font-size: 0.92em;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* ══════════════════════════════
       MEETINGS BLOCK
    ══════════════════════════════ */
    .meetings-block {
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--grey-border);
    }

    .meetings-list { background: var(--white); }

    .meeting-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--grey-border);
      transition: background 0.2s;
    }
    .meeting-item:last-child { border-bottom: none; }
    .meeting-item:hover { background: var(--grey-bg); }

    .meeting-tag {
      font-size: 0.68em;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .tag-happening { background: var(--orange);   color: var(--white); }
    .tag-upcoming  { background: var(--wmo-blue); color: var(--white); }

    .meeting-body  { flex: 1; min-width: 0; }
    .meeting-type  {
      font-size: 0.75em; font-weight: 700;
      color: var(--wmo-blue); text-transform: uppercase;
      letter-spacing: 0.04em; margin-bottom: 2px;
    }
    .meeting-desc {
      font-size: 0.85em; color: var(--text-main);
      font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .meeting-desc a { color: inherit; text-decoration: none; }
    .meeting-desc a:hover { text-decoration: underline; color: var(--wmo-blue); }
    .meeting-meta { font-size: 0.75em; color: var(--text-sub); margin-top: 3px; }

    .show-more-btn {
      display: block; width: 100%;
      background: var(--grey-bg); border: none;
      border-top: 1px solid var(--grey-border);
      color: var(--wmo-blue); font-size: 0.82em; font-weight: 600;
      padding: 10px; cursor: pointer; text-align: center;
      transition: background 0.2s;
    }
    .show-more-btn:hover { background: #dce8f5; }

    .empty-state {
      padding: 20px 16px; text-align: center;
      color: var(--text-sub); font-size: 0.85em; font-style: italic;
    }

    @media (max-width: 540px) {
      .carousel-track, .carousel-slide img, .carousel-loading { height: 240px; }
      .caption-inner { padding: 8px 12px; }
      .caption-title { font-size: 0.85em; }
      .caption-desc  { display: none; }
    }
  </style>
</head>
<body>

  <!-- ══ IMAGE CAROUSEL ══ -->
  <div id="carouselLoading" class="carousel-loading">⏳ Loading highlights…</div>

  <div class="carousel-block" id="carouselBlock" style="display:none;">
    <div class="carousel-track" id="carouselTrack"></div>
    <button class="carousel-btn prev" id="prevBtn">&#8249;</button>
    <button class="carousel-btn next" id="nextBtn">&#8250;</button>
    <div class="carousel-dots" id="carouselDots"></div>
  </div>

  <!-- ══ MEETINGS ══ -->
  <div class="meetings-block">
    <div class="section-header">
      <span>📅</span> Upcoming Meetings &amp; Events
    </div>
    <div class="meetings-list" id="meetingsList">
      <div class="empty-state">Loading meetings…</div>
    </div>
  </div>

<script>
/* ─── CSV parser ─── */
function parseCSV(text) {
  const rows = []; let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i+1];
    if (c==='"'){ inQ&&n==='"'?(cell+='"',i++):(inQ=!inQ); }
    else if (c===','&&!inQ){ row.push(cell.trim()); cell=''; }
    else if ((c==='\n'||c==='\r')&&!inQ){
      if(cell.trim()) row.push(cell.trim());
      if(row.length) rows.push(row); row=[]; cell='';
    } else { cell+=c; }
  }
  if(cell.trim()) row.push(cell.trim());
  if(row.length) rows.push(row);
  return rows;
}

/* ─────────────────────────────────────────
   IMAGE CAROUSEL
───────────────────────────────────────── */
const CAROUSEL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0cF4IEKQKzC02cwlUM9y39FQ-zN6DldydRQGsFADKSbm_cVbN3K4Q-Ys4Nvuo7-u3wKUuJ7jeKOQ0/pub?gid=215469679&single=true&output=csv';

let currentSlide = 0, totalSlides = 0, autoTimer = null;

async function loadCarousel() {
  try {
    const res  = await fetch(CAROUSEL_CSV);
    const text = await res.text();
    const rows = parseCSV(text);
    const headers = rows[0];

    const slides = rows.slice(1).filter(row => {
      const d = {};
      headers.forEach((h,i) => d[h.trim()] = row[i]?.trim()||'');
      return d.Related?.includes('II') && d.page?.includes('Home');
    }).map(row => {
      const d = {};
      headers.forEach((h,i) => d[h.trim()] = row[i]?.trim()||'');
      return {
        image: d.Image || '',
        title: d.Title || '',
        link:  d.Link  || '#',
        desc:  d['Description (for homepage content)'] || ''
      };
    });

    if (!slides.length) throw new Error('no slides');
    buildCarousel(slides);
  } catch(e) {
    document.getElementById('carouselLoading').textContent = 'Could not load highlights.';
  }
}

function buildCarousel(slides) {
  totalSlides = slides.length;
  const track = document.getElementById('carouselTrack');
  const dots  = document.getElementById('carouselDots');

  track.innerHTML = slides.map((s,i) => `
    <div class="carousel-slide">
      <img src="${s.image}" alt="${s.title}" loading="${i===0?'eager':'lazy'}">
      <div class="carousel-caption">
        <div class="caption-inner">
          <span class="caption-tag">Highlight</span>
          <div class="caption-title"><a href="${s.link}" target="_blank">${s.title}</a></div>
          ${s.desc ? `<div class="caption-desc">${s.desc}</div>` : ''}
        </div>
      </div>
    </div>`).join('');

  dots.innerHTML = slides.map((_,i) =>
    `<button class="carousel-dot${i===0?' active':''}" data-i="${i}"></button>`
  ).join('');

  dots.querySelectorAll('.carousel-dot').forEach(btn =>
    btn.addEventListener('click', () => goTo(+btn.dataset.i))
  );

  document.getElementById('prevBtn').addEventListener('click', () => goTo((currentSlide - 1 + totalSlides) % totalSlides));
  document.getElementById('nextBtn').addEventListener('click', () => goTo((currentSlide + 1) % totalSlides));

  document.getElementById('carouselLoading').style.display = 'none';
  document.getElementById('carouselBlock').style.display   = 'block';

  startAuto();
}

function goTo(idx) {
  currentSlide = idx;
  document.getElementById('carouselTrack').style.transform = `translateX(-${idx * 100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d,i) =>
    d.classList.toggle('active', i===idx)
  );
}

function startAuto() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => goTo((currentSlide + 1) % totalSlides), 5000);
}

/* ─────────────────────────────────────────
   MEETINGS
───────────────────────────────────────── */
const MEETINGS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0cF4IEKQKzC02cwlUM9y39FQ-zN6DldydRQGsFADKSbm_cVbN3K4Q-Ys4Nvuo7-u3wKUuJ7jeKOQ0/pub?gid=0&single=true&output=csv';
const SHOW_INIT = 3;
const MONTH_MAP = {january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11};

function parseDate(s) {
  const m = s.match(/(\d+)(?:-\d+)?\s+([A-Za-z]+)\s+(\d{4})/);
  if (!m) return null;
  const mon = MONTH_MAP[m[2].toLowerCase()];
  return mon!==undefined ? new Date(+m[3],mon,+m[1]) : null;
}

async function loadMeetings() {
  try {
    const res  = await fetch(MEETINGS_CSV);
    const text = await res.text();
    const rows = parseCSV(text);

    const meetings = rows.slice(1)
      .filter(r => r[0] && (r[0].trim()==='RA II'||r[0].trim()==='RA II & RA V') && !r[2]?.trim())
      .map(r => ({
        type:    r[1]||'',
        desc:    r[3]||'',
        link:    r[4]||'',
        venue:   r[5]||'',
        date:    r[6]||'',
        checker: (r[7]||'').toLowerCase()
      }))
      .filter(m => m.checker==='today'||m.checker==='upcoming')
      .sort((a,b) => {
        if(a.checker==='today'&&b.checker!=='today') return -1;
        if(a.checker!=='today'&&b.checker==='today') return 1;
        const da=parseDate(a.date), db=parseDate(b.date);
        return da&&db ? da-db : 0;
      });

    window._allMeetings = meetings;
    renderMeetings(false);
  } catch(e) {
    document.getElementById('meetingsList').innerHTML =
      '<div class="empty-state">Could not load meetings data.</div>';
  }
}

function renderMeetings(showAll) {
  const meetings = window._allMeetings || [];
  const list     = document.getElementById('meetingsList');
  if (!meetings.length) {
    list.innerHTML = '<div class="empty-state">No upcoming meetings at this time.</div>';
    return;
  }
  const visible   = showAll ? meetings : meetings.slice(0, SHOW_INIT);
  const moreCount = meetings.length - SHOW_INIT;

  list.innerHTML = visible.map(m => `
    <div class="meeting-item">
      <span class="meeting-tag ${m.checker==='today'?'tag-happening':'tag-upcoming'}">
        ${m.checker==='today'?'Happening':'Upcoming'}
      </span>
      <div class="meeting-body">
        <div class="meeting-type">${m.type}</div>
        <div class="meeting-desc">${m.link?`<a href="${m.link}" target="_blank">${m.desc}</a>`:m.desc}</div>
        <div class="meeting-meta">${m.venue?m.venue+' &nbsp;|&nbsp; ':''}${m.date}</div>
      </div>
    </div>`).join('')
    + (!showAll && moreCount > 0
       ? `<button class="show-more-btn" onclick="renderMeetings(true)">▼ Show ${moreCount} more meeting${moreCount>1?'s':''}</button>`
       : '');
}

/* ─── Init ─── */
loadCarousel();
loadMeetings();
</script>
</body>
</html>
