<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RA II – Carousel & Meetings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: transparent;
      color: #1a1a1a;
      width: 100%;
      overflow-x: hidden;
      font-size: 19px;
    }

    :root {
      --wmo-blue:    #1a4f8a;
      --blue-dot:    #3b82c4;
      --white:       #ffffff;
      --grey-bg:     #f7f8fa;
      --grey-border: #e5e7eb;
      --text-main:   #111827;
      --text-sub:    #6b7280;
      --radius-card: 12px;
      --shadow-card: 0 1px 6px rgba(0,0,0,0.08);
      --orange:      #e8820c;
    }

    /* ══════════════════════════════
       SECTION TITLE
    ══════════════════════════════ */
    .section-title {
      display: inline-block;
      background: var(--wmo-blue);
      color: var(--white);
      font-size: 0.78em;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    /* ══════════════════════════════
       IMAGE CAROUSEL — height 400px
    ══════════════════════════════ */
    .carousel-wrap { margin-bottom: 28px; }

    .carousel-block {
      position: relative;
      width: 100%;
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      background: #eee;
      border: 1px solid var(--grey-border);
    }

    .carousel-track {
      display: flex;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
      height: 600px;
    }

    .carousel-slide {
      min-width: 100%;
      position: relative;
      flex-shrink: 0;
    }

    .carousel-slide img {
      width: 100%;
      height: 500px;
      object-fit: cover;
      display: block;
    }

    .carousel-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
    }

    .caption-inner {
      width: 100%;
      background: rgba(255,255,255,0.95);
      padding: 13px 20px 16px;
    }

    .caption-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82em;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-sub);
      margin-bottom: 6px;
    }
    .caption-tag::before {
      content: '';
      display: inline-block;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--blue-dot);
    }

    .caption-title {
      font-size: 1.1em;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.35;
    }
    .caption-title a { color: inherit; text-decoration: none; }
    .caption-title a:hover { color: var(--wmo-blue); text-decoration: underline; }

    .caption-desc {
      font-size: 0.92em;
      color: var(--text-sub);
      line-height: 1.5;
      margin-top: 5px;
    }

    .carousel-btn {
      position: absolute;
      top: 43%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.85);
      color: var(--text-main);
      border: 1px solid var(--grey-border);
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 1.15em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, box-shadow 0.2s;
      z-index: 10;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .carousel-btn:hover { background: var(--white); box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
    .carousel-btn.prev { left: 10px; }
    .carousel-btn.next { right: 10px; }

    .carousel-dots {
      position: absolute;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .carousel-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      border: none;
    }
    .carousel-dot.active {
      background: var(--white);
      transform: scale(1.3);
    }

    .carousel-loading {
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--grey-bg);
      color: var(--text-sub);
      font-size: 1em;
      border-radius: var(--radius-card);
      border: 1px solid var(--grey-border);
    }

    /* ══════════════════════════════
       MEETINGS BLOCK
    ══════════════════════════════ */
    .meetings-card {
      background: var(--white);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      border: 1px solid var(--grey-border);
      overflow: hidden;
    }

    .meeting-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 15px 18px;
      border-bottom: 1px solid var(--grey-border);
      transition: background 0.15s;
    }
    .meeting-item:last-child { border-bottom: none; }
    .meeting-item:hover { background: var(--grey-bg); }

    .meeting-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82em;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-sub);
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .meeting-tag::before {
      content: '';
      display: inline-block;
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tag-happening::before { background: var(--orange); }
    .tag-upcoming::before  { background: var(--blue-dot); }

    .meeting-body  { flex: 1; min-width: 0; }
    .meeting-desc {
      font-size: 1.05em;
      color: var(--text-main);
      font-weight: 600;
      line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .meeting-desc a { color: inherit; text-decoration: none; }
    .meeting-desc a:hover { color: var(--wmo-blue); text-decoration: underline; }
    .meeting-meta {
      font-size: 0.88em;
      color: var(--text-sub);
      margin-top: 4px;
    }

    .show-more-btn {
      display: block; width: 100%;
      background: var(--grey-bg); border: none;
      border-top: 1px solid var(--grey-border);
      color: var(--wmo-blue); font-size: 0.95em; font-weight: 600;
      padding: 13px; cursor: pointer; text-align: center;
      transition: background 0.15s;
      border-radius: 0 0 var(--radius-card) var(--radius-card);
    }
    .show-more-btn:hover { background: #eef3fa; }

    .empty-state {
      padding: 24px 18px; text-align: center;
      color: var(--text-sub); font-size: 1em; font-style: italic;
    }

    @media (max-width: 540px) {
      .carousel-track, .carousel-slide img, .carousel-loading { height: 240px; }
      .caption-inner { padding: 9px 14px 12px; }
      .caption-title { font-size: 1em; }
      .caption-desc  { display: none; }
      .carousel-dots { bottom: 65px; }
    }
  </style>
</head>
<body>

  <!-- ══ IMAGE CAROUSEL ══ -->
  <div class="carousel-wrap">
    <div class="section-title">Highlights</div>
    <div id="carouselLoading" class="carousel-loading">Loading highlights…</div>
    <div class="carousel-block" id="carouselBlock" style="display:none;">
      <div class="carousel-track" id="carouselTrack"></div>
      <button class="carousel-btn prev" id="prevBtn">&#8249;</button>
      <button class="carousel-btn next" id="nextBtn">&#8250;</button>
      <div class="carousel-dots" id="carouselDots"></div>
    </div>
  </div>

  <!-- ══ MEETINGS ══ -->
  <div class="meetings-wrap">
    <div class="section-title">Upcoming Meetings &amp; Events</div>
    <div class="meetings-card">
      <div id="meetingsList">
        <div class="empty-state">Loading meetings…</div>
      </div>
    </div>
  </div>

<script>
function notifyHeight(){
  const h=document.body.scrollHeight;
  window.parent.postMessage({iframeHeight:h},'*');
  if(window.parentIFrame)window.parentIFrame.size(h);
}
new ResizeObserver(()=>notifyHeight()).observe(document.body);
window.addEventListener('load',notifyHeight);

function parseCSV(text){
  const rows=[];let row=[],cell='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(c==='"'){inQ&&n==='"'?(cell+='"',i++):(inQ=!inQ);}
    else if(c===','&&!inQ){row.push(cell.trim());cell='';}
    else if((c==='\n'||c==='\r')&&!inQ){
      if(cell.trim())row.push(cell.trim());
      if(row.length)rows.push(row);row=[];cell='';
    }else{cell+=c;}
  }
  if(cell.trim())row.push(cell.trim());
  if(row.length)rows.push(row);
  return rows;
}

const CAROUSEL_CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0cF4IEKQKzC02cwlUM9y39FQ-zN6DldydRQGsFADKSbm_cVbN3K4Q-Ys4Nvuo7-u3wKUuJ7jeKOQ0/pub?gid=215469679&single=true&output=csv';
let cur=0,total=0,autoTimer=null;

async function loadCarousel(){
  try{
    const rows=parseCSV(await(await fetch(CAROUSEL_CSV)).text());
    const h=rows[0];
    const slides=rows.slice(1).filter(r=>{
      const d={};h.forEach((k,i)=>d[k.trim()]=r[i]?.trim()||'');
      return d.Related?.includes('II')&&d.page?.includes('Home');
    }).map(r=>{
      const d={};h.forEach((k,i)=>d[k.trim()]=r[i]?.trim()||'');
      return{image:d.Image||'',title:d.Title||'',link:d.Link||'#',
             desc:d['Description (for homepage content)']||''};
    });
    if(!slides.length)throw new Error();
    buildCarousel(slides);
  }catch(e){
    document.getElementById('carouselLoading').textContent='Could not load highlights.';
    notifyHeight();
  }
}

function buildCarousel(slides){
  total=slides.length;
  const track=document.getElementById('carouselTrack');
  const dots=document.getElementById('carouselDots');
  track.innerHTML=slides.map((s,i)=>`
    <div class="carousel-slide">
      <img src="${s.image}" alt="${s.title}" loading="${i===0?'eager':'lazy'}">
      <div class="carousel-caption">
        <div class="caption-inner">
          <div class="caption-tag">Highlight</div>
          <div class="caption-title"><a href="${s.link}" target="_blank">${s.title}</a></div>
          ${s.desc?`<div class="caption-desc">${s.desc}</div>`:''}
        </div>
      </div>
    </div>`).join('');
  dots.innerHTML=slides.map((_,i)=>
    `<button class="carousel-dot${i===0?' active':''}" data-i="${i}"></button>`).join('');
  dots.querySelectorAll('.carousel-dot').forEach(b=>b.addEventListener('click',()=>goTo(+b.dataset.i)));
  document.getElementById('prevBtn').addEventListener('click',()=>goTo((cur-1+total)%total));
  document.getElementById('nextBtn').addEventListener('click',()=>goTo((cur+1)%total));
  document.getElementById('carouselLoading').style.display='none';
  document.getElementById('carouselBlock').style.display='block';
  document.querySelectorAll('.carousel-slide img').forEach(img=>img.addEventListener('load',notifyHeight));
  notifyHeight();
  autoTimer=setInterval(()=>goTo((cur+1)%total),5000);
}

function goTo(idx){
  cur=idx;
  document.getElementById('carouselTrack').style.transform=`translateX(-${idx*100}%)`;
  document.querySelectorAll('.carousel-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

const MEETINGS_CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0cF4IEKQKzC02cwlUM9y39FQ-zN6DldydRQGsFADKSbm_cVbN3K4Q-Ys4Nvuo7-u3wKUuJ7jeKOQ0/pub?gid=0&single=true&output=csv';
const SHOW_INIT=3;
const MM={january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11};

function parseDate(s){
  const m=s.match(/(\d+)(?:-\d+)?\s+([A-Za-z]+)\s+(\d{4})/);
  if(!m)return null;
  const mo=MM[m[2].toLowerCase()];
  return mo!==undefined?new Date(+m[3],mo,+m[1]):null;
}

async function loadMeetings(){
  try{
    const rows=parseCSV(await(await fetch(MEETINGS_CSV)).text());
    const meetings=rows.slice(1)
      .filter(r=>r[0]&&(r[0].trim()==='RA II'||r[0].trim()==='RA II & RA V')&&!r[2]?.trim())
      .map(r=>({type:r[1]||'',desc:r[3]||'',link:r[4]||'',
                venue:r[5]||'',date:r[6]||'',checker:(r[7]||'').toLowerCase()}))
      .filter(m=>m.checker==='today'||m.checker==='upcoming')
      .sort((a,b)=>{
        if(a.checker==='today'&&b.checker!=='today')return -1;
        if(a.checker!=='today'&&b.checker==='today')return 1;
        const da=parseDate(a.date),db=parseDate(b.date);
        return da&&db?da-db:0;
      });
    window._meetings=meetings;
    renderMeetings(false);
  }catch(e){
    document.getElementById('meetingsList').innerHTML='<div class="empty-state">Could not load meetings.</div>';
    notifyHeight();
  }
}

function renderMeetings(all){
  const meetings=window._meetings||[];
  const list=document.getElementById('meetingsList');
  if(!meetings.length){
    list.innerHTML='<div class="empty-state">No upcoming meetings at this time.</div>';
    notifyHeight();return;
  }
  const vis=all?meetings:meetings.slice(0,SHOW_INIT);
  const more=meetings.length-SHOW_INIT;
  list.innerHTML=vis.map(m=>`
    <div class="meeting-item">
      <span class="meeting-tag ${m.checker==='today'?'tag-happening':'tag-upcoming'}">
        ${m.checker==='today'?'Happening':'Upcoming'}
      </span>
      <div class="meeting-body">
        <div class="meeting-desc">${m.link?`<a href="${m.link}" target="_blank">${m.desc}</a>`:m.desc}</div>
        <div class="meeting-meta">${m.type}${m.venue?' &nbsp;·&nbsp; '+m.venue:''} &nbsp;·&nbsp; ${m.date}</div>
      </div>
    </div>`).join('')
    +(!all&&more>0?`<button class="show-more-btn" onclick="renderMeetings(true)">View ${more} more meeting${more>1?'s':''}</button>`:'');
  notifyHeight();
}

loadCarousel();
loadMeetings();
</script>
</body>
</html>
